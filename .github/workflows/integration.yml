name: Integration Tests

on:
  # PR check: triggered by sub-repos via repository_dispatch
  repository_dispatch:
    types: [dependency-updated, pr-check, release-check]

  # Manual trigger with version inputs
  workflow_dispatch:
    inputs:
      proxy_version:
        description: "xpyd-proxy version (e.g. v1.2.0, or 'main' for HEAD)"
        default: "release"
      sim_version:
        description: "xpyd-sim version (e.g. v0.4.0, or 'main' for HEAD)"
        default: "release"
      bench_version:
        description: "xpyd-bench version (e.g. v0.2.0, or 'main' for HEAD)"
        default: "release"

  # Nightly at 2am UTC
  schedule:
    - cron: '0 2 * * *'

  push:
    branches: [main]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Record component versions
        id: versions
        run: |
          echo "proxy_sha=$(gh api repos/xPyD-hub/xPyD-proxy/commits/main --jq '.sha[:8]')" >> "$GITHUB_OUTPUT"
          echo "sim_sha=$(gh api repos/xPyD-hub/xPyD-sim/commits/main --jq '.sha[:8]')" >> "$GITHUB_OUTPUT"
          echo "bench_sha=$(gh api repos/xPyD-hub/xPyD-bench/commits/main --jq '.sha[:8]')" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          # If triggered by a PR check, install that component from PR branch
          if [ "${{ github.event.client_payload.ref }}" != "" ]; then
            pip install "git+https://github.com/xPyD-hub/${{ github.event.client_payload.repo }}@${{ github.event.client_payload.ref }}"
          fi

          # For nightly/push: install all from main HEAD
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "push" ]; then
            pip install "git+https://github.com/xPyD-hub/xPyD-proxy@main"
            pip install "git+https://github.com/xPyD-hub/xPyD-sim@main"
            pip install "git+https://github.com/xPyD-hub/xPyD-bench@main"
          fi

          # For manual trigger: respect version inputs
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.proxy_version }}" = "main" ]; then
              pip install "git+https://github.com/xPyD-hub/xPyD-proxy@main"
            elif [ "${{ inputs.proxy_version }}" != "release" ]; then
              pip install "xpyd-proxy==${{ inputs.proxy_version }}"
            fi
            if [ "${{ inputs.sim_version }}" = "main" ]; then
              pip install "git+https://github.com/xPyD-hub/xPyD-sim@main"
            elif [ "${{ inputs.sim_version }}" != "release" ]; then
              pip install "xpyd-sim==${{ inputs.sim_version }}"
            fi
            if [ "${{ inputs.bench_version }}" = "main" ]; then
              pip install "git+https://github.com/xPyD-hub/xPyD-bench@main"
            elif [ "${{ inputs.bench_version }}" != "release" ]; then
              pip install "xpyd-bench==${{ inputs.bench_version }}"
            fi
          fi

          # Install remaining deps (pinned releases for anything not overridden above)
          pip install -e ".[dev]"

      - name: Run e2e tests
        run: pytest tests/e2e/ tests/c1_single_node_basic/ -v --tb=short --timeout=120

  stress:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ "${{ github.event_name }}" = "schedule" ]; then
            pip install "git+https://github.com/xPyD-hub/xPyD-proxy@main"
            pip install "git+https://github.com/xPyD-hub/xPyD-sim@main"
            pip install "git+https://github.com/xPyD-hub/xPyD-bench@main"
          fi

          pip install -e ".[dev]"

      - name: Run stress tests
        run: pytest tests/stress/ -v --tb=short --timeout=300

  # --- Nightly failure: auto-create issue ---
  report-failure:
    runs-on: ubuntu-latest
    needs: [e2e, stress]
    if: failure() && github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Identify failing component
        id: blame
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check which jobs failed
          E2E_FAILED="${{ needs.e2e.result == 'failure' }}"
          STRESS_FAILED="${{ needs.stress.result == 'failure' }}"

          # Get recent commits (last 24h) from each repo
          PROXY_COMMITS=$(gh api "repos/xPyD-hub/xPyD-proxy/commits?since=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)&per_page=5" --jq 'length')
          SIM_COMMITS=$(gh api "repos/xPyD-hub/xPyD-sim/commits?since=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)&per_page=5" --jq 'length')
          BENCH_COMMITS=$(gh api "repos/xPyD-hub/xPyD-bench/commits?since=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)&per_page=5" --jq 'length')

          echo "e2e_failed=$E2E_FAILED" >> "$GITHUB_OUTPUT"
          echo "stress_failed=$STRESS_FAILED" >> "$GITHUB_OUTPUT"
          echo "proxy_commits=$PROXY_COMMITS" >> "$GITHUB_OUTPUT"
          echo "sim_commits=$SIM_COMMITS" >> "$GITHUB_OUTPUT"
          echo "bench_commits=$BENCH_COMMITS" >> "$GITHUB_OUTPUT"

          # Determine target repo for issue
          # If only one repo had recent commits, blame it
          TOTAL=$((PROXY_COMMITS + SIM_COMMITS + BENCH_COMMITS))
          if [ "$TOTAL" -eq 0 ]; then
            echo "target_repo=xPyD-hub/xPyD-integration" >> "$GITHUB_OUTPUT"
          elif [ "$PROXY_COMMITS" -gt 0 ] && [ "$SIM_COMMITS" -eq 0 ] && [ "$BENCH_COMMITS" -eq 0 ]; then
            echo "target_repo=xPyD-hub/xPyD-proxy" >> "$GITHUB_OUTPUT"
          elif [ "$SIM_COMMITS" -gt 0 ] && [ "$PROXY_COMMITS" -eq 0 ] && [ "$BENCH_COMMITS" -eq 0 ]; then
            echo "target_repo=xPyD-hub/xPyD-sim" >> "$GITHUB_OUTPUT"
          elif [ "$BENCH_COMMITS" -gt 0 ] && [ "$PROXY_COMMITS" -eq 0 ] && [ "$SIM_COMMITS" -eq 0 ]; then
            echo "target_repo=xPyD-hub/xPyD-bench" >> "$GITHUB_OUTPUT"
          else
            echo "target_repo=xPyD-hub/xPyD-integration" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET="${{ steps.blame.outputs.target_repo }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DATE=$(date -u +%Y-%m-%d)

          BODY=$(cat <<BODYEOF
          ## Nightly Integration Test Failure
          Date: ${DATE}
          Run: ${RUN_URL}
          Failed Jobs: e2e=${{ needs.e2e.result }}, stress=${{ needs.stress.result }}
          Recent Commits (24h): proxy=${{ steps.blame.outputs.proxy_commits }}, sim=${{ steps.blame.outputs.sim_commits }}, bench=${{ steps.blame.outputs.bench_commits }}
          Auto-triage: Issue filed in ${TARGET} based on recent commit activity.
          BODYEOF
          )

          gh issue create \
            --repo "$TARGET" \
            --title "Nightly integration failure: ${DATE}" \
            --body "$BODY" \
            --label "bug,integration"

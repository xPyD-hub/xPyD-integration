name: Integration Tests

on:
  repository_dispatch:
    types: [dependency-updated, pr-check, release-check]

  workflow_dispatch:
    inputs:
      proxy_version:
        description: "xpyd-proxy version (e.g. 1.2.0, or 'main' for HEAD)"
        default: "release"
      sim_version:
        description: "xpyd-sim version (e.g. 0.4.0, or 'main' for HEAD)"
        default: "release"
      bench_version:
        description: "xpyd-bench version (e.g. 0.2.0, or 'main' for HEAD)"
        default: "release"

  schedule:
    - cron: '0 2 * * *'

  push:
    branches: [main]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  single-node:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "push" ]; then
            pip install "git+https://github.com/xPyD-hub/xPyD-sim@main"
          fi
          if [ "${{ github.event.client_payload.ref }}" != "" ]; then
            pip install "git+https://github.com/xPyD-hub/${{ github.event.client_payload.repo }}@${{ github.event.client_payload.ref }}"
          fi
          pip install -e ".[dev]"
      - name: Run single-node tests
        run: |
          pytest tests/single_basic/ tests/single_advanced/ tests/single_stress/ \
            -v --tb=short --timeout=120 \
            || [ $? -eq 5 ]

  pd:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "push" ]; then
            pip install "git+https://github.com/xPyD-hub/xPyD-proxy@main"
            pip install "git+https://github.com/xPyD-hub/xPyD-sim@main"
          fi
          if [ "${{ github.event.client_payload.ref }}" != "" ]; then
            pip install "git+https://github.com/xPyD-hub/${{ github.event.client_payload.repo }}@${{ github.event.client_payload.ref }}"
          fi
          pip install -e ".[dev]"
      - name: Run PD tests
        run: |
          pytest tests/pd_basic/ tests/pd_advanced/ tests/pd_stress/ \
            -v --tb=short --timeout=120 \
            || [ $? -eq 5 ]

  multi-pd:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "push" ]; then
            pip install "git+https://github.com/xPyD-hub/xPyD-proxy@main"
            pip install "git+https://github.com/xPyD-hub/xPyD-sim@main"
            pip install "git+https://github.com/xPyD-hub/xPyD-bench@main"
          fi
          if [ "${{ github.event.client_payload.ref }}" != "" ]; then
            pip install "git+https://github.com/xPyD-hub/${{ github.event.client_payload.repo }}@${{ github.event.client_payload.ref }}"
          fi
          pip install -e ".[dev]"
      - name: Run multi-PD tests
        run: |
          pytest tests/multi_pd_basic/ tests/multi_pd_advanced/ tests/multi_pd_stress/ \
            -v --tb=short --timeout=300 \
            || [ $? -eq 5 ]

  report-failure:
    runs-on: ubuntu-latest
    needs: [single-node, pd, multi-pd]
    if: failure() && github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Create issue on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue create \
            --repo xPyD-hub/xPyD-integration \
            --title "Nightly integration failure: ${DATE}" \
            --body "Run: ${RUN_URL}" \
            --label "bug"

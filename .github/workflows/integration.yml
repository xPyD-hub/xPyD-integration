name: Integration Tests

on:
  repository_dispatch:
    types: [dependency-updated, pr-check, release-check]

  workflow_dispatch:
    inputs:
      proxy_version:
        description: "xpyd-proxy version (e.g. 1.2.0, or 'main' for HEAD)"
        default: "release"
      sim_version:
        description: "xpyd-sim version (e.g. 0.4.0, or 'main' for HEAD)"
        default: "release"
      bench_version:
        description: "xpyd-bench version (e.g. 0.2.0, or 'main' for HEAD)"
        default: "release"

  schedule:
    - cron: '0 2 * * *'

  pull_request:
    branches: [main]

  push:
    branches: [main]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  single-node:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "push" ]; then
            pip install "git+https://github.com/xPyD-hub/xPyD-sim@main"
          fi
          if [ "${{ github.event.client_payload.ref }}" != "" ]; then
            pip install "git+https://github.com/xPyD-hub/${{ github.event.client_payload.repo }}@${{ github.event.client_payload.ref }}"
          fi
          pip install -e ".[dev]"
      - name: Run single-node tests
        run: |
          pytest xpyd_integration/single_basic/ xpyd_integration/single_advanced/ xpyd_integration/single_concurrent_stress/ \
            -v --tb=short --timeout=120 \
            || [ $? -eq 5 ]

  pd-1p1d:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "push" ]; then
            pip install "git+https://github.com/xPyD-hub/xPyD-proxy@main"
            pip install "git+https://github.com/xPyD-hub/xPyD-sim@main"
          fi
          if [ "${{ github.event.client_payload.ref }}" != "" ]; then
            pip install "git+https://github.com/xPyD-hub/${{ github.event.client_payload.repo }}@${{ github.event.client_payload.ref }}"
          fi
          pip install -e ".[dev]"
      - name: Run 1P1D tests
        run: |
          pytest xpyd_integration/1p1d_basic/ xpyd_integration/1p1d_advanced/ xpyd_integration/1p1d_concurrent_stress/ \
            -v --tb=short --timeout=120 \
            || [ $? -eq 5 ]

  xpyd:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "push" ]; then
            pip install "git+https://github.com/xPyD-hub/xPyD-proxy@main"
            pip install "git+https://github.com/xPyD-hub/xPyD-sim@main"
            pip install "git+https://github.com/xPyD-hub/xPyD-bench@main"
          fi
          if [ "${{ github.event.client_payload.ref }}" != "" ]; then
            pip install "git+https://github.com/xPyD-hub/${{ github.event.client_payload.repo }}@${{ github.event.client_payload.ref }}"
          fi
          pip install -e ".[dev]"
      - name: Run xPyD tests
        run: |
          pytest xpyd_integration/xpyd_basic/ xpyd_integration/xpyd_advanced/ xpyd_integration/xpyd_concurrent_stress/ \
            -v --tb=short --timeout=300 \
            || [ $? -eq 5 ]

  report-status:
    runs-on: ubuntu-latest
    needs: [single-node, pd-1p1d, xpyd]
    if: always() && github.event_name == 'repository_dispatch' && github.event.client_payload.repo != ''
    steps:
      - name: Determine result
        id: result
        run: |
          if [ "${{ needs.single-node.result }}" = "failure" ] || [ "${{ needs.pd-1p1d.result }}" = "failure" ] || [ "${{ needs.xpyd.result }}" = "failure" ]; then
            echo "state=failure" >> "$GITHUB_OUTPUT"
            echo "description=Integration tests failed" >> "$GITHUB_OUTPUT"
          else
            echo "state=success" >> "$GITHUB_OUTPUT"
            echo "description=Integration tests passed" >> "$GITHUB_OUTPUT"
          fi

      - name: Report back to source repo
        env:
          GH_TOKEN: ${{ secrets.INTEGRATION_TOKEN }}
        run: |
          REPO="${{ github.event.client_payload.repo }}"
          REF="${{ github.event.client_payload.ref }}"
          STATE="${{ steps.result.outputs.state }}"
          DESC="${{ steps.result.outputs.description }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ -z "$REF" ] || [ -z "$REPO" ]; then
            echo "No ref or repo in payload, skipping status report"
            exit 0
          fi

          # Get the HEAD commit SHA of the PR branch
          COMMIT_SHA=$(gh api "repos/xPyD-hub/${REPO}/git/ref/heads/${REF}" --jq '.object.sha' 2>/dev/null || echo "")

          if [ -z "$COMMIT_SHA" ]; then
            echo "Could not resolve commit SHA for ${REPO}@${REF}, skipping"
            exit 0
          fi

          echo "Reporting ${STATE} to ${REPO}@${COMMIT_SHA}"
          gh api "repos/xPyD-hub/${REPO}/statuses/${COMMIT_SHA}"             -f state="${STATE}"             -f context="integration-tests"             -f description="${DESC}"             -f target_url="${RUN_URL}"

  report-failure:
    runs-on: ubuntu-latest
    needs: [single-node, pd-1p1d, xpyd]
    if: failure() && github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Create issue on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue create \
            --repo xPyD-hub/xPyD-integration \
            --title "Nightly integration failure: ${DATE}" \
            --body "Run: ${RUN_URL}" \
            --label "bug"
